appId: com.agentlead.desktop
productName: AgentLead
directories:
  output: dist
  buildResources: resources

files:
  - main.js
  - preload.js
  - splash.html
  - renderer/dist/**/*
  - "!node_modules"

extraResources:
  - from: ../backend
    to: backend
    filter:
      - "**/*"
      - "!node_modules"
      - "!.env*"

asar: true

win:
  target: nsis
  icon: resources/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

mac:
  target: dmg
  icon: resources/icon.icns
  category: public.app-category.business

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

publish:
  provider: github
  owner: cameroncook10
  repo: LEAD-Scraper

afterPack: "./scripts/install-backend-deps.js"
