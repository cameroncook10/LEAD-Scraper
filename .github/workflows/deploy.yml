name: Deploy to Production

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

concurrency:
  group: production
  cancel-in-progress: false   # Never cancel an in-flight deploy

jobs:
  # ── Deploy Frontend to Vercel ───────────────────────────────────────────────
  deploy-vercel:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Build & Deploy to Vercel
        run: |
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── Deploy Backend to Server via SSH ────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Server
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-vercel
    # Only runs if SSH secrets are set (optional path for self-hosted)
    if: ${{ secrets.DEPLOY_SSH_KEY != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Deploy to server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -e
            cd /srv/lead-scraper
            git pull origin main
            cd backend
            npm ci --omit=dev
            # Zero-downtime reload via PM2 (if available)
            pm2 reload lead-scraper-backend --update-env || true
            # Or restart the docker container
            docker compose pull backend && docker compose up -d backend || true
          EOF

  # ── Post-deploy Health Check ─────────────────────────────────────────────────
  healthcheck:
    name: Post-deploy Health Check
    runs-on: ubuntu-latest
    needs: [deploy-vercel]
    steps:
      - name: Check frontend is live
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.PRODUCTION_URL }}" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && exit 0
            sleep 10
          done
          echo "Health check failed"
          exit 1
        if: vars.PRODUCTION_URL != ''
